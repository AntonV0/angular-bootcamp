<h2>Parent Component</h2>
<p>This is the Parent component. It contains a message that will be passed to the Child component.</p>
<app-child [data]="message"></app-child>
<!-- This line includes the Child component in the Parent component's template and binds the 'message' property of the Parent component to the 'data' input property of the Child component using Angular's property binding syntax [data]="message". This allows the Parent component to pass data to the Child component, enabling the Child component to display or use the message defined in the Parent component. -->
